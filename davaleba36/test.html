<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ინტერაქტიული ქვეყნების კატალოგი</title>

  <style>
    /* ================== CSS VARIABLES ================== */
    :root {
      --bg-color: #f2f2f2;
      --card-bg: rgba(255, 255, 255, 0.4);
      --text-color: #000;
      --border-color: rgba(255, 255, 255, 0.6);
      --shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    body.dark-theme {
      --bg-color: linear-gradient(135deg, #0f2027, #203a43, #000000);
      --card-bg: rgba(255, 255, 255, 0.1);
      --text-color: #fff;
      --border-color: rgba(255, 255, 255, 0.3);
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    /* ================== GLOBAL ================== */
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: Arial, sans-serif;
      transition: 0.5s all ease;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* ================== TOGGLE ================== */
    .toggle-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .toggle {
      position: relative;
      width: 60px;
      height: 30px;
    }

    .toggle input {
      display: none;
    }

    .slider {
      background: #ccc;
      border-radius: 30px;
      width: 100%;
      height: 100%;
      position: absolute;
      cursor: pointer;
      transition: 0.4s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: 0.4s;
    }

    input:checked + .slider {
      background: #4f9cff;
    }

    input:checked + .slider::before {
      transform: translateX(30px);
    }

    /* ================== LETTER FILTER ================== */
    .letters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .letters button {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .letters button:hover {
      transform: scale(1.1);
    }

    /* ================== CARDS ================== */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: 0.4s ease;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <h1>🌍 ქვეყნების კატალოგი</h1>

  <!-- Dark / Light Toggle -->
  <div class="toggle-container">
    <label class="toggle">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Letters Filter -->
  <div class="letters" id="letters"></div>

  <!-- Cards -->
  <div class="container" id="countries"></div>

  <script>
    const countriesContainer = document.getElementById("countries");
    const lettersContainer = document.getElementById("letters");
    const toggle = document.getElementById("themeToggle");

    let allCountries = [];

    /* ================== FETCH DATA ================== */
    fetch("https://restcountries.com/v3.1/all?fields=name")
      .then(res => res.json())
      .then(data => {
        allCountries = data;
        displayCountries(data);
        createLetterFilters(data);
      });

    /* ================== DISPLAY COUNTRIES ================== */
    function displayCountries(data) {
      countriesContainer.innerHTML = "";
      data.forEach(country => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = country.name.common;
        countriesContainer.appendChild(card);
      });
    }

    /* ================== LETTER FILTER (FOR + SET) ================== */
    function createLetterFilters(data) {
      const letterSet = new Set();

      for (let i = 0; i < data.length; i++) {
        letterSet.add(data[i].name.common[0].toUpperCase());
      }

      [...letterSet].sort().forEach(letter => {
        const btn = document.createElement("button");
        btn.textContent = letter;
        btn.onclick = () => {
          const filtered = allCountries.filter(c =>
            c.name.common.startsWith(letter)
          );
          displayCountries(filtered);
        };
        lettersContainer.appendChild(btn);
      });
    }

    /* ================== THEME TOGGLE ================== */
    toggle.addEventListener("change", () => {
      document.body.classList.toggle("dark-theme");
    });
  </script>

</body>
</html>
