<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Backpack Demo</title>

<style>
body{
    font-family: sans-serif;
    text-align:center;
    margin-top:40px;
}

/* ზურგჩანთა (მშობელი) */
.bag{
    width:300px;
    height:250px;
    background:brown;
    margin:0 auto;
    padding:20px;
    display:flex;
    gap:15px;
    align-items:flex-start;
}

/* ნივთები (შვილები) */
.item{
    width:60px;
    height:60px;
    cursor:pointer;
}

.apple{
    background:red;
}

.book{
    background:gold;
}

button{
    margin-top:20px;
    padding:8px 15px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>🎒 ზურგჩანთა</h2>

<div class="bag" id="bag">
    <div class="item apple"></div>
    <div class="item book"></div>
</div>

<button id="copyBtn">ახალი ჩანთის ჩალაგება (Copy)</button>
<button id="eatBtn">ვაშლის შეჭმა (Update)</button>

<div id="log"></div>

<script>
// === 1️⃣ შაბლონი ობიექტი ===
const templateBag = {
    lunch: {
        fruit: 'fresh'
    }
};

let copiedBag = null;

// === 2️⃣ Deep Copy ===
document.getElementById("copyBtn").addEventListener("click", function(){

    // ღრმა ასლი
    copiedBag = JSON.parse(JSON.stringify(templateBag));

    document.getElementById("log").innerText =
        "შეიქმნა ახალი ჩანთა. ვაშლი არის: " + copiedBag.lunch.fruit;
});

// === 3️⃣ Update (ვაშლის შეჭმა) ===
document.getElementById("eatBtn").addEventListener("click", function(){

    if(!copiedBag){
        alert("ჯერ შექმენი ახალი ჩანთა!");
        return;
    }

    copiedBag.lunch.fruit = "eaten";

    document.getElementById("log").innerText =
        "კოპირებულ ჩანთაში ვაშლი გახდა: " + copiedBag.lunch.fruit +
        " | შაბლონში ისევ არის: " + templateBag.lunch.fruit;
});

// === 4️⃣ Event Bubbling ===
const bag = document.getElementById("bag");
const items = document.querySelectorAll(".item");

items.forEach(item => {
    item.addEventListener("click", function(){
        document.getElementById("log").innerText = "ნივთი აღებულია";
    });
});

bag.addEventListener("click", function(){
    document.getElementById("log").innerText += " → ჩანთა იკვრება";
});
</script>

</body>
</html>
