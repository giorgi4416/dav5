<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ჯადოსნური ყუთი</title>
  <style>
    body {
      background: linear-gradient(135deg, #4b0082, #8a2be2);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2em;
      text-shadow: 0 0 10px #fff;
    }

    button {
      background: #ffcc00;
      color: #000;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px #ffcc00;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px #ffcc00, 0 0 60px #ffcc00;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
      padding: 20px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      width: 300px;
      min-height: 60px;
      box-shadow: inset 0 0 10px #fff;
    }
  </style>
</head>
<body>
  <h1>🎁 ჯადოსნური ყუთი 🎁</h1>
  <button onclick="openBox()">ჯადოსნური ყუთის გახსნა</button>
  <div id="result"></div>

  <script>
    function magicBox() {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          const random = Math.random();
          if (random > 0.5) {
            resolve("გილოცავ! შენ იპოვე განძი! 💎");
          } else {
            reject("სამწუხაროდ, ყუთი ცარიელია! 👻");
          }
        }, 1000);
      });
    }

    function openBox() {
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = "🔮 ყუთი იღება...";
      
      magicBox()
        .then(success => {
          resultDiv.style.color = "#00ff99";
          resultDiv.textContent = success;
        })
        .catch(error => {
          resultDiv.style.color = "#ff4444";
          resultDiv.textContent = error;
        });
    }
  </script>
</body>
</html>
